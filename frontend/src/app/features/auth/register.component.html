<mat-card class="card">
  <h2>Regisztráció</h2>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <mat-form-field appearance="outline" class="full">
      <mat-label>Felhasználónév</mat-label>
      <input matInput formControlName="username" />
      <mat-error *ngIf="form.controls.username.hasError('required')">
        Kötelező
      </mat-error>
      <mat-error *ngIf="form.controls.username.hasError('minlength')">
        Minimum 3 karakter
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Jelszó</mat-label>
      <input matInput type="password" formControlName="password" />
      <mat-error *ngIf="form.controls.password.hasError('required')">
        Kötelező
      </mat-error>
      <mat-error *ngIf="form.controls.password.hasError('minlength')">
        Minimum 6 karakter
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Jelszó megerősítése</mat-label>
      <input matInput type="password" formControlName="confirmPassword" />
      <mat-error *ngIf="form.controls.confirmPassword.hasError('required')">
        Kötelező
      </mat-error>
      <mat-error *ngIf="form.hasError('passwordMismatch')">
        A két jelszó nem egyezik
      </mat-error>
    </mat-form-field>

    <button mat-raised-button color="primary" class="full" [disabled]="loading || form.invalid">
      {{ loading ? 'Regisztrálunk…' : 'Regisztráció' }}
    </button>
  </form>

  <p class="hint">
    Van már fiókod?
    <a routerLink="/login">Lépj be itt</a>
  </p>
</mat-card>
